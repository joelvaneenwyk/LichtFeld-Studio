# https://taskfile.dev

version: "3"

vars:
  BUILD_TYPE: Release
  BUILD_DIR: build
  VCPKG_ROOT: '{{joinPath .ROOT_DIR "../vcpkg"}}'
  TOOLCHAIN_FILE: '{{joinPath .VCPKG_ROOT "scripts/buildsystems/vcpkg.cmake"}}'
  EXE: '{{joinPath .BUILD_DIR "LichtFeld-Studio.exe"}}'
  # Locate cl.exe for CUDA host compiler (Windows only; empty on other OS).
  # Short 8.3 path avoids quoting issues with spaces.
  CL_EXE:
    sh: 'cmd.exe /c scripts\\find_cl.cmd 2>/dev/null || true'
  RC_EXE:
    sh: 'cmd.exe /c scripts\\find_rc.cmd 2>/dev/null || true'

tasks:
  default:
    desc: Build and run LichtFeld Studio
    deps: [run]

  vcpkg:
    desc: Clone and bootstrap vcpkg (one-time setup)
    status:
      - test -f "{{joinPath .VCPKG_ROOT "vcpkg.exe"}}"
    cmds:
      - git clone https://github.com/microsoft/vcpkg.git "{{.VCPKG_ROOT}}"
      - cmd: cmd.exe /c "{{.VCPKG_ROOT}}/bootstrap-vcpkg.bat" -disableMetrics
        platforms: [windows]
      - cmd: "{{.VCPKG_ROOT}}/bootstrap-vcpkg.sh -disableMetrics"
        platforms: [linux, darwin]

  configure:
    desc: Configure CMake build
    deps: [vcpkg]
    sources:
      - CMakeLists.txt
      - vcpkg.json
      - vcpkg-configuration.json
      - cmake/**/*
      - src/**/CMakeLists.txt
      - tests/CMakeLists.txt
      - external/CMakeLists.txt
    generates:
      - '{{joinPath .BUILD_DIR "build.ninja"}}'
    env:
      VCPKG_ROOT: "{{.VCPKG_ROOT}}"
    cmds:
      # Windows: run cmake inside minimal MSVC env (cl.exe dir on PATH — NOT
      # vcvarsall, which bloats PATH past the 8191-char batch limit).
      # Explicitly point cmake at every MSVC / Windows SDK tool it needs.
      - cmd: >-
          cmd /c "scripts\\msvc_env.cmd
          cmake -B {{.BUILD_DIR}}
          -DCMAKE_BUILD_TYPE={{.BUILD_TYPE}}
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE={{.TOOLCHAIN_FILE}}
          -DCMAKE_C_COMPILER={{.CL_EXE}}
          -DCMAKE_CXX_COMPILER={{.CL_EXE}}
          -DCMAKE_CUDA_HOST_COMPILER={{.CL_EXE}}
          -DCMAKE_RC_COMPILER={{.RC_EXE}}"
        platforms: [windows]
      - cmd: >-
          cmake -B {{.BUILD_DIR}}
          -DCMAKE_BUILD_TYPE={{.BUILD_TYPE}}
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE={{.TOOLCHAIN_FILE}}
        platforms: [linux, darwin]

  build:
    desc: Build LichtFeld Studio
    deps: [configure]
    sources:
      - src/**/*.cpp
      - src/**/*.cu
      - src/**/*.h
      - src/**/*.hpp
      - src/**/*.cuh
      - external/**/*.cpp
      - external/**/*.hpp
      - external/**/*.h
      - CMakeLists.txt
      - src/**/CMakeLists.txt
    generates:
      - "{{.EXE}}"
    cmds:
      - cmd: cmd /c "scripts\\msvc_env.cmd cmake --build {{.BUILD_DIR}} -j"
        platforms: [windows]
      - cmd: cmake --build {{.BUILD_DIR}} -j
        platforms: [linux, darwin]

  run:
    desc: Build and run LichtFeld Studio
    deps: [build]
    cmds:
      - "{{.EXE}}"

  clean:
    desc: Remove build directory
    cmds:
      - rm -rf {{.BUILD_DIR}}

  ci:
    desc: Run full CI build via PowerShell script (includes env checks, vcpkg, LibTorch)
    cmds:
      - powershell -ExecutionPolicy Bypass -File ./build_lichtfeld.ps1

  test:
    desc: Build and run tests
    deps: [configure]
    cmds:
      - cmd: cmd /c "scripts\\msvc_env.cmd cmake --build {{.BUILD_DIR}} -j --target lichtfeld_tests"
        platforms: [windows]
      - cmd: cmake --build {{.BUILD_DIR}} -j --target lichtfeld_tests
        platforms: [linux, darwin]
      - '{{joinPath .BUILD_DIR "lichtfeld_tests"}}'
